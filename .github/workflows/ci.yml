name: CI

on:
  pull_request:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  java-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [21]

    defaults:
      run:
        working-directory: ./microservices-project-feature-sqs/product-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1


      - name: Validate POM
        run: mvn -B -q validate

      - name: Compile
        run: mvn -B -q compile

      - name: Unit tests
        run: mvn test